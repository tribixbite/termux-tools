<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      max-height: 580px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 13px;
    }

    /* Header */
    .header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #161b22, #1c2333);
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 600; color: #f0f6fc; }
    .header-sub { font-size: 11px; color: #8b949e; }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.connected { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
    .status-dot.connecting { background: #d29922; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #f85149; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    .status-text { flex: 1; font-weight: 500; }
    .status-detail { font-size: 11px; color: #8b949e; font-family: monospace; }

    /* Tabs — scrollable for 7 tabs */
    .tab-bar {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 0 0 auto;
      padding: 8px 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #c9d1d9; }
    .tab-btn.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
    }

    /* Panels */
    .panel { display: none; padding: 12px 16px; }
    .panel.active { display: block; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      padding: 10px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
    }
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: #f0f6fc;
      font-family: monospace;
    }
    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Test suite */
    .test-list { display: flex; flex-direction: column; gap: 6px; }
    .test-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .test-item:hover { border-color: #30363d; }
    .test-item.running { border-color: #d29922; }
    .test-item.pass { border-color: #3fb950; }
    .test-item.fail { border-color: #f85149; }
    .test-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .test-name { flex: 1; font-weight: 500; font-size: 12px; }
    .test-detail { font-size: 10px; color: #8b949e; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .test-ms { font-size: 10px; color: #8b949e; font-family: monospace; min-width: 40px; text-align: right; }

    /* Log viewer */
    .log-container {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 6px;
      max-height: 280px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10px;
      line-height: 1.6;
    }
    .log-entry {
      padding: 2px 8px;
      border-bottom: 1px solid #21262d0a;
      display: flex;
      gap: 6px;
    }
    .log-entry:hover { background: #161b2240; }
    .log-ts { color: #484f58; min-width: 65px; flex-shrink: 0; }
    .log-lvl { min-width: 36px; flex-shrink: 0; font-weight: 600; }
    .log-lvl.info { color: #58a6ff; }
    .log-lvl.warn { color: #d29922; }
    .log-lvl.error { color: #f85149; }
    .log-lvl.tool { color: #a5d6ff; }
    .log-lvl.ws { color: #7ee787; }
    .log-msg { color: #c9d1d9; word-break: break-all; }
    .log-data { color: #484f58; word-break: break-all; }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #30363d; }
    .btn:active { background: #3a424d; }
    .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
    .btn-danger:hover { background: #f85149; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-row .btn { flex: 1; text-align: center; }

    /* Tab info */
    .tab-info-list { display: flex; flex-direction: column; gap: 4px; }
    .tab-info-item {
      padding: 6px 8px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 4px;
      font-size: 11px;
    }
    .tab-info-item .tab-url {
      color: #58a6ff;
      font-family: monospace;
      font-size: 10px;
      word-break: break-all;
    }
    .tab-info-item .tab-title { font-weight: 500; }
    .tab-active-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      background: #238636;
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      margin-left: 4px;
    }

    /* Summary bar */
    .test-summary {
      display: flex; gap: 12px; margin-bottom: 10px;
      padding: 8px 10px;
      background: #161b22;
      border-radius: 6px;
      border: 1px solid #21262d;
      font-size: 12px;
      align-items: center;
    }
    .test-summary .pass-count { color: #3fb950; font-weight: 600; }
    .test-summary .fail-count { color: #f85149; font-weight: 600; }
    .section-title {
      font-size: 11px; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 12px 0 8px;
    }
    .section-title:first-child { margin-top: 0; }

    /* Network entries */
    .net-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px;
      border-bottom: 1px solid #21262d0a;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10px; line-height: 1.5;
    }
    .net-entry:hover { background: #161b2240; }
    .net-status {
      min-width: 28px; text-align: center; font-weight: 700;
      border-radius: 3px; padding: 1px 4px;
    }
    .net-status.s2xx { color: #3fb950; }
    .net-status.s3xx { color: #d29922; }
    .net-status.s4xx, .net-status.s5xx { color: #f85149; }
    .net-method {
      min-width: 32px; font-weight: 600; color: #58a6ff;
      font-size: 9px; text-transform: uppercase;
    }
    .net-type { min-width: 40px; color: #8b949e; font-size: 9px; }
    .net-url { flex: 1; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .net-ts { color: #484f58; min-width: 55px; text-align: right; flex-shrink: 0; }

    /* Console entries */
    .con-entry {
      display: flex; gap: 6px;
      padding: 2px 8px;
      border-bottom: 1px solid #21262d0a;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10px; line-height: 1.6;
    }
    .con-entry:hover { background: #161b2240; }
    .con-lvl { min-width: 36px; font-weight: 600; flex-shrink: 0; }
    .con-lvl.log, .con-lvl.info { color: #58a6ff; }
    .con-lvl.warn { color: #d29922; }
    .con-lvl.error { color: #f85149; }
    .con-lvl.debug { color: #8b949e; }
    .con-msg { color: #c9d1d9; word-break: break-all; }

    /* Storage sections */
    .storage-section {
      background: #161b22; border: 1px solid #21262d;
      border-radius: 6px; margin-bottom: 8px; overflow: hidden;
    }
    .storage-header {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; cursor: pointer;
      font-size: 11px; font-weight: 600; color: #c9d1d9;
    }
    .storage-header:hover { background: #1c2333; }
    .storage-chevron { transition: transform 0.15s; font-size: 10px; color: #8b949e; }
    .storage-chevron.open { transform: rotate(90deg); }
    .storage-count {
      font-size: 9px; color: #8b949e; font-weight: 400;
      background: #21262d; border-radius: 10px; padding: 1px 6px;
    }
    .storage-body { display: none; }
    .storage-body.open { display: block; }
    .storage-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-top: 1px solid #21262d;
      font-size: 10px; font-family: monospace;
    }
    .storage-row:hover { background: #1c233340; }
    .storage-key { color: #58a6ff; min-width: 80px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .storage-val { flex: 1; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .storage-del {
      background: none; border: none; color: #f85149; cursor: pointer;
      font-size: 12px; padding: 0 4px; flex-shrink: 0; opacity: 0.6;
    }
    .storage-del:hover { opacity: 1; }
    .storage-empty { padding: 8px 10px; color: #484f58; font-size: 10px; border-top: 1px solid #21262d; }

    /* Filter row for panels */
    .panel-toolbar {
      display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
    }
    .panel-filter {
      flex: 1; padding: 5px 8px; border-radius: 4px;
      border: 1px solid #30363d; background: #0d1117;
      color: #c9d1d9; font-size: 11px; font-family: monospace;
    }
    .panel-filter::placeholder { color: #484f58; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">&#9889;</div>
    <div>
      <div class="header-title">CFC Bridge</div>
      <div class="header-sub">Claude in Chrome &mdash; Edge Android</div>
      <div class="header-sub" id="versionInfo" style="color:#58a6ff;font-family:monospace"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Loading...</span>
    <span class="status-detail" id="statusDetail"></span>
  </div>

  <!-- Tab navigation -->
  <div class="tab-bar">
    <button class="tab-btn active" data-panel="dashboard">Dashboard</button>
    <button class="tab-btn" data-panel="tests">Tests</button>
    <button class="tab-btn" data-panel="logs">Logs</button>
    <button class="tab-btn" data-panel="tabs">Tabs</button>
    <button class="tab-btn" data-panel="network">Network</button>
    <button class="tab-btn" data-panel="console">Console</button>
    <button class="tab-btn" data-panel="storage">Storage</button>
  </div>

  <!-- Dashboard panel -->
  <div class="panel active" id="panel-dashboard">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-requests">0</div>
        <div class="stat-label">Tool Requests</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-errors">0</div>
        <div class="stat-label">Errors</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-uptime">--</div>
        <div class="stat-label">Connected</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-tabs">0</div>
        <div class="stat-label">Tabs</div>
      </div>
    </div>
    <div class="section-title">Last Tool</div>
    <div class="stat-card" style="margin-bottom:8px">
      <div style="font-size:12px;color:#f0f6fc;font-weight:500" id="stat-lasttool">None</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-reconnect">Reconnect</button>
      <button class="btn" id="btn-launch-bridge">Launch Bridge</button>
      <button class="btn btn-danger" id="btn-stop-bridge" style="display:none">Stop</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn" id="btn-update" style="flex:1">
        <span id="btn-update-text">Check for Update</span>
      </button>
    </div>
    <div class="section-title" style="margin-top:12px">Memory</div>
    <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#161b22;border:1px solid #21262d;border-radius:6px;cursor:pointer;font-size:12px">
      <input type="checkbox" id="chk-inject-all" style="accent-color:#58a6ff">
      <span>Inject into all pages</span>
      <span style="flex:1"></span>
      <span style="font-size:10px;color:#8b949e" id="inject-mode-label">on-demand</span>
    </label>
  </div>

  <!-- Tests panel -->
  <div class="panel" id="panel-tests">
    <div class="test-summary">
      <span>Results:</span>
      <span class="pass-count" id="test-pass-count">0 passed</span>
      <span class="fail-count" id="test-fail-count">0 failed</span>
      <span style="flex:1"></span>
      <button class="btn" id="btn-run-all" style="padding:4px 10px;font-size:11px">Run All</button>
    </div>
    <div class="test-list" id="test-list"></div>
  </div>

  <!-- Logs panel -->
  <div class="panel" id="panel-logs">
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <span class="section-title" style="margin:0;flex:1">Message Log</span>
      <button class="btn" id="btn-refresh-logs" style="padding:4px 10px;font-size:11px">Refresh</button>
    </div>
    <div class="log-container" id="log-container"></div>
  </div>

  <!-- Tabs panel -->
  <div class="panel" id="panel-tabs">
    <div class="section-title">MCP Tab Group</div>
    <div class="tab-info-list" id="tab-info-list"></div>
  </div>

  <!-- Network panel -->
  <div class="panel" id="panel-network">
    <div class="panel-toolbar">
      <input class="panel-filter" id="network-filter" type="text" placeholder="Filter by URL or type...">
      <button class="btn" id="btn-clear-network" style="padding:4px 10px;font-size:11px">Clear</button>
    </div>
    <div class="log-container" id="network-list" style="max-height:340px"></div>
  </div>

  <!-- Console panel -->
  <div class="panel" id="panel-console">
    <div class="panel-toolbar">
      <input class="panel-filter" id="console-filter" type="text" placeholder="Filter messages...">
      <button class="btn" id="btn-clear-console" style="padding:4px 10px;font-size:11px">Clear</button>
    </div>
    <div class="log-container" id="console-list" style="max-height:340px"></div>
  </div>

  <!-- Storage panel -->
  <div class="panel" id="panel-storage">
    <div id="storage-sections"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
