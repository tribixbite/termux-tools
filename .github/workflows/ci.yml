name: CI

on:
  push:
    branches: [main]
    paths:
      - 'bridge/src/**'
      - 'bridge/package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'bridge/**'

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build bridge
        run: npm run build
